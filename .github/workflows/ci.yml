name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project mde.xcodeproj -scheme mde

      - name: Build and test (TC-000 + Phase 0 baselines)
        run: |
          xcodebuild \
            -project mde.xcodeproj \
            -scheme mde \
            -destination 'platform=macOS' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CLANG_ENABLE_CODE_COVERAGE=NO
          xcodebuild \
            -project mde.xcodeproj \
            -scheme mde \
            -destination 'platform=macOS' \
            -only-testing:mdeTests \
            test \
            CODE_SIGNING_ALLOWED=NO \
            CLANG_ENABLE_CODE_COVERAGE=NO
